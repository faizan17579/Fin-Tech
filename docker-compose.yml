version: '3.9'
services:
  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=development
      - FLASK_DEBUG=1
      - MONGO_URI=mongodb://mongo:27017/finforecast
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - mongo
      - redis
  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    depends_on:
      - api
  mongo:
    image: mongo:7
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
  redis:
    image: redis:7
    restart: unless-stopped
    ports:
      - "6379:6379"

volumes:
  mongo_data:


